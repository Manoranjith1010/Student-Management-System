<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px 15px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: darkblue;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid gray;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        .delete-btn {
            background: red;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Employee Management System</h1>

    <input type="text" id="empId" placeholder="Employee ID">
    <input type="text" id="empName" placeholder="Employee Name">
    <input type="text" id="empDept" placeholder="Department">

    <button onclick="addEmployee()">Add Employee</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="employeeTable">
        </tbody>
    </table>
</div>



</body>
</html>
